<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matricular Asignaturas - SIGAM</title>
  <link rel="stylesheet" href="../estilos/dashboard.css">
</head>
<body>
  <header>
    <div class="logo-nombre">
      <img src="../assets/logo.svg" alt="SIGAM Logo">
      <h2>SIGAM - Matrícula de Asignaturas</h2>
    </div>
    <nav>
      <a href="dashboard.html">Inicio</a>
      <a href="horario.html">Horario</a>
      <a href="perfil.html">Perfil</a>
      <a href="../index.html">Cerrar Sesión</a>
    </nav>
  </header>

  <main>
    <section class="matricula">
      <h3>Seleccione las asignaturas para su matrícula</h3>
      <table>
        <thead>
          <tr>
            <th>Asignatura</th>
            <th>Créditos</th>
            <th>Horario</th>
            <th>Seleccionar</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Programación I</td>
            <td>3</td>
            <td>Lunes y Miércoles 8:00 - 10:00</td>
            <td><input type="checkbox"></td>
          </tr>
          <tr>
            <td>Bases de Datos</td>
            <td>3</td>
            <td>Martes y Jueves 10:00 - 12:00</td>
            <td><input type="checkbox"></td>
          </tr>
          <tr>
            <td>Inglés Técnico</td>
            <td>2</td>
            <td>Viernes 8:00 - 10:00</td>
            <td><input type="checkbox"></td>
          </tr>
        </tbody>
      </table>
      <button class="btn-confirmar">Confirmar Matrícula</button>
    </section>
  </main>
</body>
</html>

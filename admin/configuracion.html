<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuración del Sistema - SIGAM</title>
  <link rel="stylesheet" href="../estilos/admin.css">
</head>
<body>
  <header>
    <div class="logo-nombre">
      <img src="../assets/logo.svg" alt="SIGAM Logo">
      <h2>Configuración General</h2>
    </div>
    <nav>
      <a href="panel.html">Inicio</a>
      <a href="estudiantes.html">Estudiantes</a>
      <a href="reportes.html">Reportes</a>
      <a href="../index.html">Cerrar Sesión</a>
    </nav>
  </header>

  <main>
    <section class="configuracion">
      <h3>Parámetros del Sistema</h3>
      <form>
        <label>Nombre de la Institución:</label>
        <input type="text" value="Centro Académico SIGAM">

        <label>Correo de Contacto:</label>
        <input type="email" value="contacto@sigam.edu">

        <label>Periodo Académico Actual:</label>
        <input type="text" value="2025-I">

        <label>Máximo de Créditos por estudiante:</label>
        <input type="number" value="20">

        <button>Guardar Cambios</button>
      </form>
    </section>
  </main>
</body>
</html>
